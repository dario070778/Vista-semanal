<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vista semanal">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json?v=11">
<link rel="icon" href="icon.svg?v=11" type="image/svg+xml">
<title>Vista semanal</title>
<style>
:root{
  --grid:#c8c8ce;
  --head:#f3f3f7;
  --red:#e2465b;
  --text:#111;
  --chip:#f7f7f9;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overscroll-behavior:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
header{background:#fff;padding:5px 4px 3px;border-bottom:1px solid var(--grid)}
.month-title{height:25px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:650}
.gridwrap{width:100vw;overflow:hidden}
table{border-collapse:collapse;width:100%;table-layout:fixed}
th,td{border:1px solid var(--grid);text-align:center;vertical-align:middle;padding:0}
thead th{height:25px;background:var(--head);font-size:16px;font-weight:650}
thead th:first-child{width:39px;font-size:13px;font-weight:500;color:#777}
tbody th{width:39px;background:var(--head);font-size:16px;font-weight:600}
td{height:26px;font-size:12px;line-height:1.05;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;position:relative}
.daynum{font-size:12px;color:#aaa;font-weight:400;margin-left:2px}
.todayHead{outline:2px solid var(--red);outline-offset:-2px;color:var(--red)}
.currentHour{outline:2px solid var(--red);outline-offset:-2px;color:var(--red)}
.currentCell{outline:2px solid var(--red);outline-offset:-2px}
.bottom-panel{border-top:1px solid var(--grid);background:#fff;padding:5px 4px 7px}
.wordbar{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.chip{min-height:25px;border:1px solid var(--grid);border-radius:7px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 4px;user-select:none}
.chip.active{outline:2px solid var(--red);outline-offset:-2px;font-weight:650}
.chip.danger{color:#b80016;background:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:flex-end;z-index:30}
.modal.show{display:flex}
.sheet{width:100%;background:white;border-radius:16px 16px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet h2{margin:0 0 9px;font-size:18px}
input[type=text]{width:100%;font:inherit;font-size:18px;padding:10px;border:1px solid var(--grid);border-radius:8px;margin-bottom:10px}
.colorline{display:flex;gap:10px;align-items:center;margin-bottom:10px}
input[type=color]{width:54px;height:38px;border:1px solid var(--grid);border-radius:8px;background:white;padding:2px}
.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:8px 0 12px}
.sw{height:34px;border:1px solid var(--grid);border-radius:8px;background:white}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.actions button{font:inherit;border:1px solid var(--grid);background:#fafafa;border-radius:7px;font-size:16px;padding:9px;color:#1677d2}
.actions button.danger{color:#b80016}
.hint{font-size:12px;color:#777;margin-top:8px;line-height:1.25}
</style>
</head>
<body>
<header><div class="month-title" id="monthTitle"></div></header>

<div class="gridwrap">
<table>
  <thead><tr id="dayRow"><th>Notas</th></tr></thead>
  <tbody id="grid"></tbody>
</table>
</div>

<div class="bottom-panel">
  <div class="wordbar" id="wordbar"></div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h2 id="modalTitle">Editar</h2>
    <input id="textInput" type="text" autocomplete="off">
    <div class="colorline">
      <input id="colorInput" type="color" value="#ffffff">
      <span style="font-size:13px;color:#777">Color</span>
    </div>
    <div class="palette" id="palette"></div>
    <div class="actions">
      <button id="saveBtn">Guardar</button>
      <button id="deleteBtn" class="danger">Vaciar</button>
      <button id="cancelBtn">Cerrar</button>
    </div>
    <div class="hint">Toca una palabra y luego una celda. Mantén pulsada una palabra para editarla. Mantén pulsada una celda y arrastra para copiar varias horas.</div>
  </div>
</div>

<script>
(() => {
  const DAYS = ["L","M","X","J","V","S","D"];
  const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const DATA_KEYS = ["vista-semanal-data-v2","vista-semanal-simple-v4"];
  const KEY = "vista-semanal-data-v2";
  const WORDS_KEY = "vista-semanal-words-v2";

  const DEFAULT_WORDS = [
    {text:"Casa", color:"#d8ebff"},
    {text:"Oficina", color:"#fff3a8"},
    {text:"Gym", color:"#d8f6d4"},
    {text:"Cardio", color:"#ffe1c2"},
    {text:"Compra", color:"#eadcff"},
    {text:"Médico", color:"#ffd6d6"},
    {text:"Libre", color:"#e9e9ee"},
    {text:"Borrar", color:"#ffffff", action:"clear"}
  ];
  const PALETTE = ["#ffffff","#ffd6d6","#ffe1c2","#fff3a8","#d8f6d4","#d8ebff","#eadcff","#e9e9ee"];

  function load(k, fb){ try{return JSON.parse(localStorage.getItem(k)) ?? fb}catch{return fb} }
  function firstAvailableData(){
    for(const k of DATA_KEYS){
      const v = load(k, null);
      if(v && Object.keys(v).length) return v;
    }
    return {};
  }

  let data = firstAvailableData();
  let words = load(WORDS_KEY, DEFAULT_WORDS);
  if (words.length < 8) words = [...words, ...DEFAULT_WORDS.slice(words.length)];
  let selectedWord = null;
  let editTarget = null;
  let drag = false, dragValue = null, longTimer = null, suppressClick = false;

  const monthTitle = document.getElementById("monthTitle");
  const dayRow = document.getElementById("dayRow");
  const grid = document.getElementById("grid");
  const wordbar = document.getElementById("wordbar");
  const modal = document.getElementById("modal");
  const textInput = document.getElementById("textInput");
  const colorInput = document.getElementById("colorInput");
  const modalTitle = document.getElementById("modalTitle");
  const palette = document.getElementById("palette");

  function save(){ localStorage.setItem(KEY, JSON.stringify(data)); }
  function saveWords(){ localStorage.setItem(WORDS_KEY, JSON.stringify(words)); }
  function key(d,h){ return d+"-"+h; }
  function todayIndex(){ return (new Date().getDay()+6)%7; }
  function norm(c){ return (c && c[0]==="#") ? c : "#ffffff"; }

  PALETTE.forEach(c=>{
    const b=document.createElement("button");
    b.className="sw"; b.type="button"; b.style.background=c;
    b.onclick=()=>colorInput.value=c;
    palette.appendChild(b);
  });

  function render(){
    renderMonth(); renderHeader(); renderGrid(); renderWords();
  }

  function renderMonth(){
    const now = new Date();
    monthTitle.textContent = MONTHS[now.getMonth()] + " " + now.getFullYear();
  }

  function renderHeader(){
    dayRow.innerHTML="<th>Notas</th>";
    const now = new Date();
    const t = todayIndex();

    DAYS.forEach((d,i)=>{
      const th=document.createElement("th");

      // Vista circular: días ya pasados pasan a la semana siguiente.
      // El cálculo usa Date real, por lo que respeta cambios de mes y años bisiestos.
      const offset = (i - t + 7) % 7;
      const date = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      date.setDate(date.getDate() + offset);

      th.innerHTML = d+"<span class='daynum'>"+date.getDate()+"</span>";
      if(i===t) th.classList.add("todayHead");
      dayRow.appendChild(th);
    });
  }

  function renderWords(){
    wordbar.innerHTML="";
    words.forEach((w,i)=>{
      const div=document.createElement("div");
      div.className="chip"+(selectedWord===i?" active":"")+(w.action==="clear"?" danger":"");
      div.textContent=w.text || "+";
      div.style.background = w.color || "#f7f7f9";
      div.onclick=()=>{
        if(suppressClick){suppressClick=false;return}
        if(w.action==="clear"){
          if(confirm("¿Borrar toda la hoja?")){
            data={}; save(); renderGrid();
          }
          return;
        }
        if(!w.text){openWord(i);return}
        selectedWord = selectedWord===i ? null : i;
        renderWords();
      };
      let t;
      const start=()=>{clearTimeout(t);t=setTimeout(()=>{suppressClick=true;openWord(i)},520)};
      const end=()=>clearTimeout(t);
      div.addEventListener("touchstart",start,{passive:true});
      div.addEventListener("touchend",end,{passive:true});
      div.addEventListener("mousedown",start);
      div.addEventListener("mouseup",end);
      wordbar.appendChild(div);
    });
  }

  function renderGrid(){
    grid.innerHTML="";
    const now=new Date(), t=todayIndex(), hr=now.getHours();
    for(let h=0;h<24;h++){
      const tr=document.createElement("tr");
      const th=document.createElement("th");
      th.textContent=h;
      if(h===hr) th.classList.add("currentHour");
      tr.appendChild(th);
      for(let d=0;d<7;d++){
        const td=document.createElement("td");
        td.dataset.d=d; td.dataset.h=h;
        const v=data[key(d,h)] || {text:"",color:"#ffffff"};
        td.textContent=v.text || "";
        td.style.background=norm(v.color);
        if(d===t && h===hr) td.classList.add("currentCell");
        bindCell(td);
        tr.appendChild(td);
      }
      grid.appendChild(tr);
    }
  }

  function bindCell(td){
    td.onclick=()=>{
      if(suppressClick){suppressClick=false;return}
      const d=+td.dataset.d,h=+td.dataset.h;
      if(selectedWord!==null && words[selectedWord]?.text){
        setCell(d,h,words[selectedWord].text,words[selectedWord].color);
        renderGrid();
      }else openCell(d,h);
    };
    td.addEventListener("touchstart", startDrag, {passive:false});
    td.addEventListener("touchmove", moveDrag, {passive:false});
    td.addEventListener("touchend", endDrag, {passive:false});
    td.addEventListener("mousedown", startDrag);
    td.addEventListener("mouseenter", moveDragMouse);
  }
  window.addEventListener("mouseup", endDrag);

  function startDrag(e){
    const td=e.currentTarget;
    clearTimeout(longTimer);
    longTimer=setTimeout(()=>{
      suppressClick=true; drag=true;
      const d=+td.dataset.d,h=+td.dataset.h;
      dragValue = data[key(d,h)] || (selectedWord!==null ? words[selectedWord] : {text:"",color:"#ffffff"});
      dragValue = {text:dragValue.text||"", color:norm(dragValue.color)};
      applyDrag(td);
      if(navigator.vibrate) navigator.vibrate(25);
    },360);
  }
  function cellFromTouch(e){
    const t=e.touches?.[0]; if(!t) return null;
    return document.elementFromPoint(t.clientX,t.clientY)?.closest("td");
  }
  function moveDrag(e){
    if(!drag) return;
    e.preventDefault();
    const td=cellFromTouch(e);
    if(td) applyDrag(td);
  }
  function moveDragMouse(e){ if(drag) applyDrag(e.currentTarget); }
  function endDrag(){
    clearTimeout(longTimer);
    if(drag){drag=false;dragValue=null;save();renderGrid();}
  }
  function applyDrag(td){
    const d=+td.dataset.d,h=+td.dataset.h;
    if(dragValue.text) data[key(d,h)]={...dragValue};
    else delete data[key(d,h)];
    td.textContent=dragValue.text || "";
    td.style.background=norm(dragValue.color);
  }

  function setCell(d,h,text,color){
    if(text) data[key(d,h)]={text, color:norm(color)};
    else delete data[key(d,h)];
    save();
  }

  function openCell(d,h){
    editTarget={type:"cell",d,h};
    const v=data[key(d,h)] || {text:"",color:"#ffffff"};
    modalTitle.textContent = DAYS[d]+" "+h+":00";
    textInput.value=v.text||"";
    colorInput.value=norm(v.color);
    modal.classList.add("show");
    setTimeout(()=>textInput.focus(),50);
  }

  function openWord(i){
    editTarget={type:"word",i};
    const w=words[i] || {text:"",color:"#ffffff"};
    modalTitle.textContent="Palabra rápida";
    textInput.value=w.action==="clear" ? "Borrar" : (w.text||"");
    colorInput.value=norm(w.color);
    modal.classList.add("show");
    setTimeout(()=>textInput.focus(),50);
  }

  document.getElementById("saveBtn").onclick=()=>{
    const text=textInput.value.trim();
    const color=norm(colorInput.value);
    if(editTarget?.type==="cell") setCell(editTarget.d,editTarget.h,text,color);
    if(editTarget?.type==="word"){
      const oldAction = words[editTarget.i]?.action;
      words[editTarget.i]={text,color};
      if(oldAction==="clear" && text.toLowerCase()==="borrar") words[editTarget.i].action="clear";
      saveWords();
    }
    modal.classList.remove("show"); render();
  };
  document.getElementById("deleteBtn").onclick=()=>{
    if(editTarget?.type==="cell") setCell(editTarget.d,editTarget.h,"","#ffffff");
    if(editTarget?.type==="word"){words[editTarget.i]={text:"",color:"#ffffff"};saveWords();}
    modal.classList.remove("show"); render();
  };
  document.getElementById("cancelBtn").onclick=()=>modal.classList.remove("show");
  modal.onclick=e=>{ if(e.target===modal) modal.classList.remove("show") };

  save();
  render();
  setInterval(render,60000);
})();
</script>
</body>
</html>
