<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vista semanal">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json?v=60">
<link rel="icon" href="icon.svg?v=60" type="image/svg+xml">
<title>Vista semanal</title>
<style>
:root{--grid:#c8c8ce;--head:#f3f3f7;--red:#e2465b;--gold:#d4af37;--text:#111}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overscroll-behavior:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
header{background:#fff;padding:5px 4px 3px;border-bottom:1px solid var(--grid)}
.month-title{height:25px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.gridwrap{width:100vw;overflow:hidden}
table{border-collapse:collapse;width:100%;table-layout:fixed}
th,td{border:1px solid var(--grid);text-align:center;vertical-align:middle;padding:0}
thead th{height:25px;background:var(--head);font-size:16px;font-weight:650}
thead th:first-child{width:39px;font-size:13px;font-weight:500;color:#777}
tbody th{width:39px;background:var(--head);font-size:16px;font-weight:600}
td{height:26px;font-size:12px;line-height:1.05;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;position:relative}
.daynum{font-size:12px;color:#aaa;font-weight:400;margin-left:2px}
.todayHead{outline:2px solid var(--red);outline-offset:-2px;color:var(--red)}
.currentHour{outline:2px solid var(--red);outline-offset:-2px;color:var(--red)}
.currentCell{outline:2px solid var(--red);outline-offset:-2px}
.importantCell{box-shadow:inset 0 0 0 3px var(--gold)!important}
.pastCell{background:#fff!important;color:transparent!important;text-shadow:none!important}
.bottom-panel{border-top:1px solid var(--grid);background:#fff;padding:5px 4px 8px}
.wordbar{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.chip,.toolbtn{min-height:25px;border:1px solid var(--grid);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 4px;user-select:none;font-weight:500;background:#fff}
.chip.active{outline:2px solid var(--red);outline-offset:-2px;font-weight:700}
.chip.deleteMode{color:#fff!important;background:#e2465b!important;border-color:#e2465b!important}
.toolrow{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:4px}
.toolbtn:disabled{opacity:.35}
.toolbtn.importantActive{border-color:var(--gold);box-shadow:inset 0 0 0 2px var(--gold)}
.previewWrap{padding:8px 4px 0}
.previewCard{display:none;align-items:center;justify-content:center;margin:0 auto;width:100%;min-height:92px;border:1px solid var(--grid);border-radius:14px;font-size:38px;font-weight:800;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.previewCard.show{display:flex}
.previewCard.importantPreview{border:3px solid var(--gold)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:flex-end;z-index:30}
.modal.show{display:flex}
.sheet{width:100%;background:white;border-radius:16px 16px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet h2{margin:0 0 9px;font-size:18px}
input[type=text]{width:100%;font:inherit;font-size:18px;padding:10px;border:1px solid var(--grid);border-radius:8px;margin-bottom:10px}
.colorline{display:flex;gap:10px;align-items:center;margin-bottom:10px}
input[type=color]{width:54px;height:38px;border:1px solid var(--grid);border-radius:8px;background:white;padding:2px}
.miniLabel{font-size:13px;color:#777}
.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:8px 0 12px}
.sw{height:34px;border:1px solid var(--grid);border-radius:8px;background:white}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.actions button{font:inherit;border:1px solid var(--grid);background:#fafafa;border-radius:7px;font-size:16px;padding:9px;color:#1677d2}
.actions button.danger{color:#b80016}
.hint{font-size:12px;color:#777;margin-top:8px;line-height:1.25}
</style>
</head>
<body>
<header><div class="month-title" id="monthTitle"></div></header>
<div class="gridwrap"><table><thead><tr id="dayRow"><th>Notas</th></tr></thead><tbody id="grid"></tbody></table></div>
<div class="bottom-panel">
  <div class="wordbar" id="wordbar"></div>
  <div class="toolrow"><button id="undoBtn" class="toolbtn" type="button" disabled>Deshacer</button><button id="importantBtn" class="toolbtn" type="button">Importante</button></div>
  <div class="previewWrap"><div class="previewCard" id="previewCard"></div></div>
</div>
<div class="modal" id="modal"><div class="sheet">
  <h2 id="modalTitle">Editar</h2>
  <input id="textInput" type="text" autocomplete="off">
  <div class="colorline">
    <input id="colorInput" type="color" value="#ffffff"><span class="miniLabel">Fondo</span>
    <input id="textColorInput" type="color" value="#111111"><span class="miniLabel">Letra</span>
  </div>
  <div class="palette" id="palette"></div>
  <div class="actions"><button id="saveBtn">Guardar</button><button id="deleteBtn" class="danger">Vaciar</button><button id="cancelBtn">Cerrar</button></div>
  <div class="hint">Toca una categoría y luego una celda. Borrar activa el modo borrado. Importante añade o quita borde dorado a la celda seleccionada.</div>
</div></div>
<script>
(() => {
const DAYS=["L","M","X","J","V","S","D"];
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DATA_KEYS=["vista-semanal-data-v2","vista-semanal-simple-v4"];
const KEY="vista-semanal-data-v2";
const WORDS_KEY="vista-semanal-words-v2";
const IMPORTANT_KEY="vista-semanal-important-v1";
const DEFAULT_WORDS=[
{text:"Casa",color:"#4A90E2",textColor:"#111111"},
{text:"Oficina",color:"#FFD54A",textColor:"#111111"},
{text:"Gym",color:"#63D471",textColor:"#111111"},
{text:"Cardio",color:"#FF9F43",textColor:"#111111"},
{text:"Compra",color:"#B57BFF",textColor:"#111111"},
{text:"Médico",color:"#FF6B6B",textColor:"#111111"},
{text:"Libre",color:"#D9D9D9",textColor:"#111111"},
{text:"Borrar",color:"#ffffff",textColor:"#b80016",action:"clear"}
];
const PALETTE=["#ffffff","#FF6B6B","#FF9F43","#FFD54A","#63D471","#4A90E2","#B57BFF","#D9D9D9"];
function load(k,fb){try{return JSON.parse(localStorage.getItem(k))??fb}catch{return fb}}
function firstData(){for(const k of DATA_KEYS){const v=load(k,null);if(v&&Object.keys(v).length)return v}return{}}
let data=firstData();
let words=load(WORDS_KEY,DEFAULT_WORDS);
if(!Array.isArray(words))words=DEFAULT_WORDS.slice();
const migrated=[];
for(let i=0;i<8;i++){const w=words[i];if(i===7)migrated[i]={text:"Borrar",color:"#ffffff",textColor:"#b80016",action:"clear"};else if(w&&w.text)migrated[i]={text:w.text,color:w.color||DEFAULT_WORDS[i].color,textColor:w.textColor||DEFAULT_WORDS[i].textColor};else migrated[i]={...DEFAULT_WORDS[i]};}
words=migrated;
let important=load(IMPORTANT_KEY,{});
let undoStack=[];
let selectedWord=null,selectedCell=null,editTarget=null,drag=false,dragValue=null,longTimer=null,suppressClick=false;
const monthTitle=document.getElementById("monthTitle"),dayRow=document.getElementById("dayRow"),grid=document.getElementById("grid"),wordbar=document.getElementById("wordbar"),modal=document.getElementById("modal"),textInput=document.getElementById("textInput"),colorInput=document.getElementById("colorInput"),textColorInput=document.getElementById("textColorInput"),modalTitle=document.getElementById("modalTitle"),palette=document.getElementById("palette"),previewCard=document.getElementById("previewCard"),undoBtn=document.getElementById("undoBtn"),importantBtn=document.getElementById("importantBtn");
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function saveWords(){localStorage.setItem(WORDS_KEY,JSON.stringify(words))}
function saveImportant(){localStorage.setItem(IMPORTANT_KEY,JSON.stringify(important))}
function snap(){undoStack=[{data:JSON.stringify(data),words:JSON.stringify(words),important:JSON.stringify(important)}];undoBtn.disabled=false}
function undo(){if(!undoStack.length)return;const s=undoStack.pop();data=JSON.parse(s.data);words=JSON.parse(s.words);important=JSON.parse(s.important);save();saveWords();saveImportant();undoBtn.disabled=true;render()}
function cellKey(d,h){return d+"-"+h}
function todayIndex(){return(new Date().getDay()+6)%7}
function norm(c){return(c&&c[0]==="#")?c:"#ffffff"}
PALETTE.forEach(c=>{const b=document.createElement("button");b.className="sw";b.type="button";b.style.background=c;b.onclick=()=>colorInput.value=c;palette.appendChild(b)});
function render(){renderMonth();renderHeader();renderGrid();renderWords();renderCurrentPreview();renderTools()}
function renderMonth(){const n=new Date();monthTitle.textContent=MONTHS[n.getMonth()]+" "+n.getFullYear()}
function renderHeader(){dayRow.innerHTML="<th>Notas</th>";const n=new Date(),t=todayIndex();DAYS.forEach((d,i)=>{const th=document.createElement("th");const off=(i-t+7)%7;const date=new Date(n.getFullYear(),n.getMonth(),n.getDate());date.setDate(date.getDate()+off);th.innerHTML=d+"<span class='daynum'>"+date.getDate()+"</span>";if(i===t)th.classList.add("todayHead");dayRow.appendChild(th)})}
function renderGrid(){grid.innerHTML="";const n=new Date(),t=todayIndex(),hr=n.getHours();for(let h=0;h<24;h++){const tr=document.createElement("tr");const th=document.createElement("th");th.textContent=h;if(h===hr)th.classList.add("currentHour");tr.appendChild(th);for(let d=0;d<7;d++){const td=document.createElement("td");td.dataset.d=d;td.dataset.h=h;const v=data[cellKey(d,h)]||{text:"",color:"#ffffff",textColor:"#111111"};td.textContent=v.text||"";td.style.background=norm(v.color);td.style.color=v.textColor||"#111111";if(d===t&&h===hr)td.classList.add("currentCell");if(important[cellKey(d,h)])td.classList.add("importantCell");if(d===t&&h<hr){td.textContent="";td.classList.add("pastCell")}bindCell(td);tr.appendChild(td)}grid.appendChild(tr)}}
function renderWords(){wordbar.innerHTML="";words.forEach((w,i)=>{const isClear=w.action==="clear";const div=document.createElement("div");div.className="chip"+(selectedWord===i?" active":"")+(isClear&&selectedWord===i?" deleteMode":"");div.textContent=w.text||"+";div.style.background=isClear?"#fff":norm(w.color);div.style.color=isClear?"#b80016":(w.textColor||"#111111");div.onclick=()=>{if(suppressClick){suppressClick=false;return}if(isClear){selectedWord=selectedWord===i?null:i;renderWords();return}if(!w.text){openWord(i);return}selectedWord=selectedWord===i?null:i;renderWords()};let timer;const start=()=>{clearTimeout(timer);if(!isClear)timer=setTimeout(()=>{suppressClick=true;openWord(i)},520)};const end=()=>clearTimeout(timer);div.addEventListener("touchstart",start,{passive:true});div.addEventListener("touchend",end,{passive:true});div.addEventListener("mousedown",start);div.addEventListener("mouseup",end);wordbar.appendChild(div)})}
function bindCell(td){td.onclick=()=>{if(suppressClick){suppressClick=false;return}const d=+td.dataset.d,h=+td.dataset.h;selectedCell={d,h};if(selectedWord!==null&&words[selectedWord]?.action==="clear"){snap();setCell(d,h,"","#ffffff","#111111");delete important[cellKey(d,h)];saveImportant();render();return}if(selectedWord!==null&&words[selectedWord]?.text){snap();setCell(d,h,words[selectedWord].text,words[selectedWord].color,words[selectedWord].textColor);render();return}openCell(d,h)};td.addEventListener("touchstart",startDrag,{passive:false});td.addEventListener("touchmove",moveDrag,{passive:false});td.addEventListener("touchend",endDrag,{passive:false});td.addEventListener("mousedown",startDrag);td.addEventListener("mouseenter",moveDragMouse)}
window.addEventListener("mouseup",endDrag);
function startDrag(e){const td=e.currentTarget;clearTimeout(longTimer);longTimer=setTimeout(()=>{suppressClick=true;drag=true;snap();const d=+td.dataset.d,h=+td.dataset.h;if(selectedWord!==null&&words[selectedWord]?.action==="clear")dragValue={text:"",color:"#ffffff",textColor:"#111111"};else if(selectedWord!==null&&words[selectedWord]?.text)dragValue={text:words[selectedWord].text,color:norm(words[selectedWord].color),textColor:words[selectedWord].textColor||"#111111"};else{const v=data[cellKey(d,h)]||{text:"",color:"#ffffff",textColor:"#111111"};dragValue={text:v.text||"",color:norm(v.color),textColor:v.textColor||"#111111"}}applyDrag(td);if(navigator.vibrate)navigator.vibrate(25)},360)}
function cellFromTouch(e){const t=e.touches?.[0];if(!t)return null;return document.elementFromPoint(t.clientX,t.clientY)?.closest("td")}
function moveDrag(e){if(!drag)return;e.preventDefault();const td=cellFromTouch(e);if(td)applyDrag(td)}
function moveDragMouse(e){if(drag)applyDrag(e.currentTarget)}
function endDrag(){clearTimeout(longTimer);if(drag){drag=false;dragValue=null;save();saveImportant();render()}}
function applyDrag(td){const d=+td.dataset.d,h=+td.dataset.h;if(dragValue.text)data[cellKey(d,h)]={...dragValue};else{delete data[cellKey(d,h)];delete important[cellKey(d,h)]}td.textContent=dragValue.text||"";td.style.background=norm(dragValue.color);td.style.color=dragValue.textColor||"#111111"}
function setCell(d,h,text,color,textColor="#111111"){if(text)data[cellKey(d,h)]={text,color:norm(color),textColor:textColor||"#111111"};else{delete data[cellKey(d,h)];delete important[cellKey(d,h)];saveImportant()}save()}
function renderCurrentPreview(){const d=todayIndex(),h=new Date().getHours();const v=data[cellKey(d,h)];if(!v||!v.text){previewCard.classList.remove("show","importantPreview");previewCard.textContent="";previewCard.style.background="#fff";return}previewCard.textContent=v.text;previewCard.style.background=norm(v.color);previewCard.style.color=v.textColor||"#111111";previewCard.classList.toggle("importantPreview",!!important[cellKey(d,h)]);previewCard.classList.add("show")}
function renderTools(){if(!selectedCell){importantBtn.classList.remove("importantActive");return}importantBtn.classList.toggle("importantActive",!!important[cellKey(selectedCell.d,selectedCell.h)])}
function openCell(d,h){selectedCell={d,h};editTarget={type:"cell",d,h};const v=data[cellKey(d,h)]||{text:"",color:"#ffffff",textColor:"#111111"};modalTitle.textContent=DAYS[d]+" "+h+":00";textInput.value=v.text||"";colorInput.value=norm(v.color);textColorInput.value=norm(v.textColor||"#111111");modal.classList.add("show");renderTools();setTimeout(()=>textInput.focus(),50)}
function openWord(i){editTarget={type:"word",i};const w=words[i]||{text:"",color:"#ffffff",textColor:"#111111"};modalTitle.textContent="Palabra rápida";textInput.value=w.text||"";colorInput.value=norm(w.color);textColorInput.value=norm(w.textColor||"#111111");modal.classList.add("show");setTimeout(()=>textInput.focus(),50)}
document.getElementById("saveBtn").onclick=()=>{const text=textInput.value.trim(),color=norm(colorInput.value),textColor=norm(textColorInput.value||"#111111");snap();if(editTarget?.type==="cell")setCell(editTarget.d,editTarget.h,text,color,textColor);if(editTarget?.type==="word"){words[editTarget.i]={text,color,textColor};saveWords()}modal.classList.remove("show");render()};
document.getElementById("deleteBtn").onclick=()=>{snap();if(editTarget?.type==="cell")setCell(editTarget.d,editTarget.h,"","#ffffff","#111111");if(editTarget?.type==="word"){words[editTarget.i]={text:"",color:"#ffffff",textColor:"#111111"};saveWords()}modal.classList.remove("show");render()};
document.getElementById("cancelBtn").onclick=()=>modal.classList.remove("show");
modal.onclick=e=>{if(e.target===modal)modal.classList.remove("show")};
undoBtn.onclick=undo;
importantBtn.onclick=()=>{if(!selectedCell)return;const k=cellKey(selectedCell.d,selectedCell.h);if(!data[k]||!data[k].text)return;snap();important[k]=!important[k];if(!important[k])delete important[k];saveImportant();render()};
save();saveWords();saveImportant();render();setInterval(render,60000);
})();
</script>
</body>
</html>
